<!DOCTYPE html>
<html>
<head>
<title>AI Skin Disease Detection</title>

<style>

body{
font-family: Arial;
text-align: center;
background-color: #f2f2f2;
padding: 40px;
}

.container{
background: white;
padding: 30px;
border-radius: 10px;
width: 400px;
margin: auto;
box-shadow: 0px 0px 10px gray;
}

button{
background: #4CAF50;
color: white;
border: none;
padding: 10px 20px;
margin-top: 10px;
cursor: pointer;
border-radius: 5px;
}

button:hover{
background: #45a049;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Skin Disease Detection</h2>

<p>Upload a skin image to detect disease</p>

<input type="file" id="imageInput">

<br><br>

<button onclick="predict()">Detect Disease</button>

<h3 id="result"></h3>

</div>

<script>

function predict(){

let file=document.getElementById("imageInput").files[0]

if(!file){
alert("Please upload an image first")
return
}

let formData=new FormData()

formData.append("image",file)

fetch("http://127.0.0.1:5000/predict",{

method:"POST",
body:formData

})

.then(response=>response.json())

.then(data=>{

document.getElementById("result").innerHTML=
"Disease : "+data["Detected Disease"]+
"<br>Confidence : "+data["Confidence (%)"]+"%"+
"<br>"+data["Recommendation"]

})

.catch(error=>{
document.getElementById("result").innerHTML="Error connecting to API"
})

}

</script>

</body>
</html>
